name: Nightly NBA Retrain

on:
  schedule:
    # GitHub Actions cron uses UTC. 07:00 UTC == 02:00 EST.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml-backend/requirements.txt

      - name: Install dependencies
        working-directory: ml-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install joblib

      - name: Run nightly NBA retrain
        working-directory: ml-backend
        run: |
          python nightly_nba_retrain.py

      - name: Upload retrain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-retrain-artifacts
          path: |
            ml-backend/nba_ensemble_metrics.json
            ml-backend/nba_prop_predictions_ml.json
            ml-backend/nba_models/*.joblib
            ml-backend/logs/*.log
          if-no-files-found: warn

      - name: Commit updated NBA artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ml-backend/nba_player_data.json
          git add ml-backend/nba_ensemble_metrics.json
          git add ml-backend/nba_prop_predictions_ml.json
          git add ml-backend/nba_models/*.joblib

          if git diff --staged --quiet; then
            echo "No model/data changes to commit."
            exit 0
          fi

          git commit -m "chore(nba): nightly retrain artifacts [skip ci]"
          git push
