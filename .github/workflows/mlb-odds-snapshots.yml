name: MLB Odds Snapshots

on:
  schedule:
    # Higher cadence around MLB action windows (UTC):
    # Weekends (Sat/Sun): start earlier for day games.
    - cron: "*/15 14-15 * * 6,0"
    # 16:00-03:59 UTC: every 15 min (roughly noon-midnight ET in DST)
    # 04:00-07:59 UTC: every 30 min (late-night ET cleanup window)
    - cron: "*/15 16-23 * * *"
    - cron: "*/15 0-3 * * *"
    - cron: "0,30 4-7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml-backend/requirements.txt

      - name: Install dependencies
        working-directory: ml-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine ET date
        id: etdate
        run: |
          echo "date_et=$(TZ=America/New_York date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Validate MLB data contract
        working-directory: ml-backend
        run: |
          python validate_mlb_data_contract.py --date "${{ steps.etdate.outputs.date_et }}" --require-props

      - name: Run odds-only snapshot
        working-directory: ml-backend
        run: |
          python fetch_mlb_stats.py --odds-only --date "${{ steps.etdate.outputs.date_et }}"

      - name: Upload odds artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-odds-snapshot-artifacts
          path: |
            ml-backend/mlb_prop_odds_history.json
            ml-backend/automation/logs/*.log
          if-no-files-found: warn

      - name: Commit updated odds history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ml-backend/mlb_prop_odds_history.json

          if git diff --staged --quiet; then
            echo "No MLB odds history changes to commit."
            exit 0
          fi

          dow_et=$(TZ=America/New_York date +%u)
          if [ "$dow_et" -ge 6 ]; then
            day_label="weekend"
          else
            day_label="weekday"
          fi

          git commit -m "chore(mlb): odds snapshot (${day_label}) [skip ci]"
          git push
