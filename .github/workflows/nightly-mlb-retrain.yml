name: Nightly MLB Retrain

on:
  schedule:
    # 08:20 UTC ~= 04:20 ET during DST (03:20 ET in standard time).
    - cron: "20 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml-backend/requirements.txt

      - name: Install dependencies
        working-directory: ml-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install joblib

      - name: Determine ET date
        id: etdate
        run: |
          echo "date_et=$(TZ=America/New_York date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch MLB data (with odds)
        working-directory: ml-backend
        run: |
          python fetch_mlb_stats.py --date "${{ steps.etdate.outputs.date_et }}"

      - name: Train MLB models
        working-directory: ml-backend
        run: |
          python train_mlb_ensemble_models.py

      - name: Upload retrain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlb-retrain-artifacts
          path: |
            ml-backend/mlb_player_data.json
            ml-backend/mlb_prop_odds_history.json
            ml-backend/mlb_ensemble_metrics.json
            ml-backend/mlb_prop_predictions_ml.json
            ml-backend/mlb_models/*.joblib
            ml-backend/automation/logs/*.log
          if-no-files-found: warn

      - name: Commit updated MLB artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ml-backend/mlb_player_data.json
          git add ml-backend/mlb_prop_odds_history.json
          git add ml-backend/mlb_ensemble_metrics.json
          git add ml-backend/mlb_prop_predictions_ml.json
          git add ml-backend/mlb_models/*.joblib

          if git diff --staged --quiet; then
            echo "No MLB model/data changes to commit."
            exit 0
          fi

          dow_et=$(TZ=America/New_York date +%u)
          if [ "$dow_et" -ge 6 ]; then
            day_label="weekend"
          else
            day_label="weekday"
          fi

          git commit -m "chore(mlb): nightly retrain artifacts (${day_label}) [skip ci]"
          git push
